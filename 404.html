<!DOCTYPE html>

<head>
	<!--<link rel="stylesheet" href="style.css">
	<link rel="stylesheet" href="src/css/404.css">-->
	<!-- LTeX: enabled=false -->
	<style>
		@import url('https://fonts.googleapis.com/css2?family=Open+Sans&display=swap');
		@import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@700&display=swap');
		@import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital@1&display=swap');
		@import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@1,700&display=swap');

		:root {
			/* Greyscale */
			--dark-gray: #333;
			--mid-gray: #666;
			--light-gray: #999;
		}

		body,
		html {
			margin: 0;
			border: 0;

			background: black;

			box-sizing: border-box;

			width: 100%;
			height: 100%;

			background-attachment: fixed;
		}

		body {
			background-color: black;
			font-family: "Open Sans", Verdana, Geneva, Tahoma, sans-serif;
			font-size: 16px;
			color: white;
			overflow-wrap: break-word;
			word-wrap: break-word;
			position: relative;
			user-select: 'text';
			display: flex;
			justify-content: center;
			align-items: center;
		}

		* {
			box-sizing: border-box;
			overflow: hidden;
		}

		.errorpage {
			padding: 5%;
			margin: 5%;

			display: flex;
			justify-content: center;
			align-items: center;
			text-align: center;

			height: 80%;
			width: 80%;

			border: white 1px solid;
			background-color: var(--dark-gray);

			font-size: 2vh;
		}

		a:link {
			color: var(--light-gray);
		}

		a:visited {
			color: var(--light-gray);
		}

		a:active {
			color: white;
		}
	</style>
	<!-- LTeX: enabled=true -->
</head>

<body>
	<div class="errorpage">
		<div class="errormessage">
			<h1>Oops!</h1>
			<br>
			<h3>The webpage you're looking for doesn't exist!</h3>
			<br>
			<h3>HTTPS Error: 404</h3>
			<br>
			<p><a href="javascript:history.back()">Go to previous page.</a></p>
			<br>
			<p><a href="index.html">Take me back home!</a></p>
			<br>
		</div>
	</div>
</body>
